<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book - Library Management System</title>
    <link rel="stylesheet" href="path/to/your/styles.css">
    <link rel="stylesheet" href="path/to/custom-edit-book-styles.css">
     
</head>
<body>
    
    <header>
        <h1>Australia University Library Management System</h1>
        <nav>
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/add-book">Add Book</a></li>
                <li class="active"><a href="/search-books">Search/Edit Books</a></li>
                <li><a href="/return">Return Book</a></li>
                <li><a href="/borrow">Borrow Book</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h3>Edit Book Details</h3>

        <div id="search-section">
            <form id="searchBookForm">
                <div class="form-group">
                    <label for="searchIdentifier">Search by Barcode / ISBN / Accession No. / Title:</label>
                    <input type="text" id="searchIdentifier" name="searchIdentifier" placeholder="Enter book ID or title" required>
                </div>
                <button type="submit" class="btn btn-primary">Search Book</button>
            </form> 
        </div>
